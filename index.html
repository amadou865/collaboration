<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet Collaboratif GitHub</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 40px;
        }

        h1{
            text-align: center;
            margin-bottom: 40px;
            color: #333;
        }

        .container{
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card{
            width: 250px;
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h2{
            color: #222;
            margin-bottom: 10px;
        }

        .card p{
            color: #666;
        }
    </style>
</head>
<body>

    <h1>Projet Collaboratif GitHub</h1>

    <div class="container">

        <!-- DIV PERSONNE 1 -->
        <div class="card">
            <h2>Amadou</h2>
            <p>Chef de projet</p>
            <p>Gestion du dépôt GitHub et validation des contributions.</p>
        </div>

        <!-- DIV PERSONNE 2 -->
        <div class="card">
            <h2>Personne 2</h2>
            <p>Ajouter votre contenu ici</p>
        </div>

        <!-- DIV PERSONNE 3 -->
        <div class="card">
            <h2>Personne 3</h2>
            <p>Ajouter votre contenu ici</p>
        </div>

    </div>

</body>
</html>
